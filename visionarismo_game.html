<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VISIONARISMO GAME</title>
<style>
  :root{
    --ui:#ffe14d;
    --ui2:#0a0f2d;
    --white:#fff;
    --danger:#ff5a5a;
    --sky:#7ec8ff;
  }
  *{box-sizing:border-box;touch-action:none;-webkit-user-select:none;user-select:none}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#030814;font-family:Arial,Helvetica,sans-serif}
  #gameWrap{position:fixed;inset:0;width:100vw;height:100vh;background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #hud{position:absolute;left:0;top:0;right:0;z-index:8;color:#fff;padding:12px 14px;display:flex;justify-content:space-between;gap:8px;pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,.6);font-weight:700}
  #hud .pill{background:rgba(5,10,25,.45);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:8px 12px;backdrop-filter:blur(4px)}
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,.44)}
  .modal{width:min(92vw,720px);background:linear-gradient(180deg,rgba(10,17,42,.95),rgba(5,8,22,.95));border:1px solid rgba(255,255,255,.16);border-radius:24px;color:#fff;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.45);text-align:center}
  .modal h1{margin:0 0 10px;font-size:clamp(26px,4vw,42px);letter-spacing:.04em}
  .modal p{margin:8px 0 0;line-height:1.5;font-size:clamp(15px,2vw,20px);opacity:.95}
  .btnRow{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px}
  button{border:0;border-radius:16px;padding:14px 22px;font-weight:900;font-size:16px;cursor:pointer}
  .primary{background:var(--ui);color:#111}
  .secondary{background:#fff;color:#111}
  .danger{background:var(--danger);color:#fff}
  #mobileControls{position:absolute;left:0;right:0;bottom:max(14px,env(safe-area-inset-bottom));display:none;z-index:9;pointer-events:none}
  #mobileControls .row{display:flex;justify-content:center;gap:12px;pointer-events:auto}
  .touchBtn{width:74px;height:74px;border-radius:22px;background:rgba(255,225,77,.95);color:#111;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:900;box-shadow:0 10px 24px rgba(0,0,0,.28);border:2px solid rgba(17,17,17,.14)}
  .touchBtn.small{width:68px;height:68px}
  .touchSpacer{width:74px;height:74px}
  #rotateHint{position:absolute;inset:0;display:none;z-index:20;background:#040917;color:#fff;align-items:center;justify-content:center;text-align:center;padding:28px}
  #rotateHint .card{max-width:460px;border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:24px;background:rgba(255,255,255,.04)}
  @media (hover:none) and (pointer:coarse){
    #mobileControls{display:block}
  }
  @media (orientation:landscape) and (hover:none) and (pointer:coarse){
    #rotateHint{display:flex}
  }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <div class="pill" id="phaseLabel">Fase 1: Ideação e Repertório</div>
    <div class="pill" id="progressLabel">Itens 0/7</div>
    <div class="pill" id="livesLabel">Vidas 3</div>
  </div>
  <div id="overlay">
    <div class="modal">
      <h1>VISIONARISMO GAME</h1>
      <p>Capture todos os elementos, desvie dos perseguidores e avance pelas 3 fases.</p>
      <div class="btnRow">
        <button class="primary" id="startBtn">JOGAR</button>
      </div>
    </div>
  </div>
  <div id="mobileControls">
    <div class="row" style="margin-bottom:10px">
      <div class="touchSpacer"></div>
      <div class="touchBtn small" id="btnUp">▲</div>
      <div class="touchSpacer"></div>
    </div>
    <div class="row">
      <div class="touchBtn" id="btnLeft">◀</div>
      <div class="touchBtn" id="btnRight">▶</div>
    </div>
  </div>
  <div id="rotateHint">
    <div class="card">
      <h2 style="margin-top:0">Vire o celular</h2>
      <p>Para jogar no mobile, mantenha a tela na vertical.</p>
    </div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const phaseLabel = document.getElementById('phaseLabel');
  const progressLabel = document.getElementById('progressLabel');
  const livesLabel = document.getElementById('livesLabel');

  const bgImgs = [null, new Image(), new Image(), new Image()];
  bgImgs[1].src = 'Fase 1.png';
  bgImgs[2].src = 'Fase 2.png';
  bgImgs[3].src = 'Fase 3.png';
  const heroImg = new Image();
  heroImg.src = 'personagem.png';

  const PHASES = [
    null,
    {
      name:'Fase 1: Ideação e Repertório',
      items:['♪','🎥','📷','🌸','🖼️','📚','📱'],
      weatherSpeed:0.0008,
      cta:{question:'Você quer abrir um negócio próprio?', yes:'next', no:'https://www.youtube.com/watch?v=cHg74pknGHQ'}
    },
    {
      name:'Fase 2: Preparo Mental e Físico',
      items:['🧻','🏋️','👕','🕶️','⛱️','✝️','🐈'],
      weatherSpeed:0.0012,
      cta:{question:'Você conhece o poder da criatividade para negócios?', yes:'next', no:'https://www.youtube.com/watch?v=jUAMRlvaPGM'}
    },
    {
      name:'Fase 3: Conquista de Vendas',
      items:['🪙','🪙','💰','💳','🥇','🏆','⛵'],
      weatherSpeed:0.0018,
      cta:{question:'Parabéns, agora você pode fazer parte deste movimento', final:'https://www.instagram.com/diretorcriativo'}
    }
  ];

  const state = {
    w:0,h:0,worldW:4200,cameraX:0,phase:1,started:false,last:0,
    gravity:2100, keys:{left:false,right:false,up:false},
    player:null, enemies:[], bullets:[], items:[], platforms:[], groundY:0,
    lives:3, blinkTimer:0, celebrate:0, invuln:0, whiteMarker:0,
    rain:[], phaseTime:0
  };

  function resize(){
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    state.w = innerWidth;
    state.h = innerHeight;
  }
  addEventListener('resize', resize);
  resize();

  function bindTouch(btn, key){
    const on = e => { e.preventDefault(); state.keys[key] = true; };
    const off = e => { e.preventDefault(); state.keys[key] = false; };
    btn.addEventListener('pointerdown', on);
    btn.addEventListener('pointerup', off);
    btn.addEventListener('pointercancel', off);
    btn.addEventListener('pointerleave', off);
  }
  bindTouch(document.getElementById('btnLeft'),'left');
  bindTouch(document.getElementById('btnRight'),'right');
  bindTouch(document.getElementById('btnUp'),'up');

  addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') state.keys.left = true;
    if (e.key === 'ArrowRight') state.keys.right = true;
    if (e.key === 'ArrowUp' || e.key === ' ') state.keys.up = true;
  });
  addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') state.keys.left = false;
    if (e.key === 'ArrowRight') state.keys.right = false;
    if (e.key === 'ArrowUp' || e.key === ' ') state.keys.up = false;
  });

  function cloud(x,y,w=170,h=46){
    return {x,y,w,h,type:'cloud'};
  }

  function buildPhase(phase){
    state.phase = phase;
    state.phaseTime = 0;
    state.cameraX = 0;
    state.worldW = 3800 + phase*400;
    state.groundY = state.h - 120;
    state.platforms = [];
    state.items = [];
    state.bullets = [];
    state.enemies = [];
    state.rain = Array.from({length: phase*35}, () => ({x:Math.random()*state.w, y:Math.random()*state.h, sp:500+Math.random()*500}));

    const gy = state.groundY;
    const base = [
      cloud(220, gy-110, 180, 52), cloud(520, gy-220, 180, 52), cloud(860, gy-150, 180, 52),
      cloud(1210, gy-290, 190, 52), cloud(1550, gy-210, 180, 52), cloud(1880, gy-340, 190, 52),
      cloud(2240, gy-200, 180, 52), cloud(2580, gy-300, 200, 52), cloud(2950, gy-180, 180, 52),
      cloud(3290, gy-260, 190, 52), cloud(3630, gy-150, 180, 52)
    ];
    state.platforms.push(...base);

    const itemXs = [290, 580, 930, 1270, 1610, 1945, 3330];
    const itemPlatforms = [0,1,2,3,4,5,9];
    PHASES[phase].items.forEach((emoji, i) => {
      const p = state.platforms[itemPlatforms[i]];
      state.items.push({
        x: itemXs[i], y: p.y - 38, w: 34, h: 34, emoji, collected:false, bob:Math.random()*Math.PI*2
      });
    });

    state.player = {
      x:90, y: gy-110, w:54, h:100, vx:0, vy:0, speed:320, jump:780,
      onGround:false, facing:1
    };
    state.lives = 3;
    state.invuln = 0;
    state.celebrate = 0;
    state.whiteMarker = 2.4;

    state.enemies = [
      makeEnemy(760, gy-100, 'A'),
      makeEnemy(2100, gy-100, 'B')
    ];
    updateHUD();
  }

  function makeEnemy(x,y,variant){
    return {
      x,y,w:48,h:92,vx:0,vy:0,speed:150,jump:720,onGround:false,lastShot:0,variant
    };
  }

  function updateHUD(){
    phaseLabel.textContent = PHASES[state.phase].name;
    progressLabel.textContent = 'Itens ' + state.items.filter(i => i.collected).length + '/7';
    livesLabel.textContent = 'Vidas ' + state.lives;
  }

  function aabb(a,b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function resolvePlatforms(ent, dt){
    ent.onGround = false;
    const gy = state.groundY;
    if (ent.y + ent.h >= gy){
      ent.y = gy - ent.h;
      ent.vy = 0;
      ent.onGround = true;
    }
    for (const p of state.platforms){
      if (ent.x + ent.w > p.x && ent.x < p.x + p.w){
        const prevBottom = ent.y + ent.h - ent.vy * dt;
        const currBottom = ent.y + ent.h;
        if (prevBottom <= p.y + 8 && currBottom >= p.y && ent.vy >= 0){
          ent.y = p.y - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        }
      }
    }
  }

  function nearestUsefulPlatform(enemy){
    let best = null;
    let bestScore = Infinity;
    for (const p of state.platforms){
      if (Math.abs((p.x+p.w/2) - (enemy.x+enemy.w/2)) < 210){
        const dy = (enemy.y+enemy.h) - p.y;
        const score = Math.abs(dy) + Math.abs((p.x+p.w/2) - (state.player.x+state.player.w/2))*0.2;
        if (p.y < enemy.y + enemy.h - 10 && dy > 0 && dy < 180 && score < bestScore){
          best = p; bestScore = score;
        }
      }
    }
    return best;
  }

  function spawnBullet(enemy){
    const sx = enemy.x + enemy.w/2;
    const sy = enemy.y + 18;
    const tx = state.player.x + state.player.w/2;
    const ty = state.player.y + state.player.h/2;
    const dx = tx - sx;
    const dy = ty - sy;
    const len = Math.hypot(dx, dy) || 1;
    const sp = 340;
    state.bullets.push({x:sx,y:sy,vx:dx/len*sp,vy:dy/len*sp,r:7});
  }

  function hitPlayer(){
    if (state.invuln > 0) return;
    state.lives -= 1;
    state.invuln = 2.2;
    if (state.lives <= 0){
      buildPhase(state.phase);
    } else {
      state.player.x = Math.max(50, state.cameraX + 60);
      state.player.y = state.groundY - state.player.h;
      state.player.vx = 0;
      state.player.vy = 0;
    }
    updateHUD();
  }

  function checkPhaseEnd(){
    if (state.items.every(i => i.collected)){
      state.started = false;
      showCTA();
    }
  }

  function showCTA(){
    const p = PHASES[state.phase];
    let html = '';
    if (state.phase < 3){
      html = `
      <div class="modal">
        <h1>${p.name}</h1>
        <p>${p.cta.question}</p>
        <div class="btnRow">
          <button class="primary" id="yesBtn">SIM</button>
          <button class="danger" id="noBtn">NÃO</button>
        </div>
      </div>`;
    } else {
      html = `
      <div class="modal">
        <h1>Parabéns</h1>
        <p>${p.cta.question}</p>
        <div class="btnRow">
          <button class="primary" id="finalBtn">QUERO</button>
        </div>
      </div>`;
    }
    overlay.innerHTML = html;
    overlay.style.display = 'flex';
    if (state.phase < 3){
      document.getElementById('yesBtn').onclick = () => {
        overlay.style.display = 'none';
        buildPhase(state.phase + 1);
        state.started = true;
      };
      document.getElementById('noBtn').onclick = () => location.href = p.cta.no;
    } else {
      document.getElementById('finalBtn').onclick = () => location.href = p.cta.final;
    }
  }

  startBtn.onclick = () => {
    overlay.style.display = 'none';
    buildPhase(1);
    state.started = true;
  };

  function update(dt){
    if (!state.started) return;
    state.phaseTime += dt;
    const pl = state.player;
    pl.vx = 0;
    if (state.keys.left) { pl.vx = -pl.speed; pl.facing = -1; }
    if (state.keys.right) { pl.vx = pl.speed; pl.facing = 1; }
    if (state.keys.up && pl.onGround){ pl.vy = -pl.jump; }

    pl.vy += state.gravity * dt;
    pl.x += pl.vx * dt;
    pl.y += pl.vy * dt;
    pl.x = Math.max(0, Math.min(state.worldW - pl.w, pl.x));
    resolvePlatforms(pl, dt);

    if (state.invuln > 0) state.invuln -= dt;
    if (state.celebrate > 0) state.celebrate -= dt;
    if (state.whiteMarker > 0) state.whiteMarker -= dt;

    for (const item of state.items){
      item.bob += dt*3;
      if (!item.collected && aabb(pl, item)){
        item.collected = true;
        state.celebrate = 0.55;
        updateHUD();
        checkPhaseEnd();
      }
    }

    for (const e of state.enemies){
      const dir = Math.sign((pl.x + pl.w/2) - (e.x + e.w/2)) || 1;
      e.vx = dir * e.speed;
      const p = nearestUsefulPlatform(e);
      if (p && e.onGround) e.vy = -e.jump;
      if (pl.y + pl.h + 4 < e.y + e.h && Math.abs(pl.x - e.x) < 170 && e.onGround) e.vy = -e.jump;
      e.vy += state.gravity * dt;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.x = Math.max(0, Math.min(state.worldW - e.w, e.x));
      resolvePlatforms(e, dt);
      e.lastShot += dt;
      if (e.lastShot > 2.1){
        e.lastShot = 0;
        spawnBullet(e);
      }
      if (aabb(pl,e)) hitPlayer();
    }

    for (let i = state.bullets.length - 1; i >= 0; i--){
      const b = state.bullets[i];
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.x < 0 || b.x > state.worldW || b.y < 0 || b.y > state.h + 400) {
        state.bullets.splice(i,1); continue;
      }
      if (b.x > pl.x && b.x < pl.x + pl.w && b.y > pl.y && b.y < pl.y + pl.h){
        state.bullets.splice(i,1); hitPlayer();
      }
    }

    state.cameraX = Math.max(0, Math.min(state.worldW - state.w, pl.x - state.w*0.35));
  }

  function drawBackground(){
    const bg = bgImgs[state.phase];
    if (bg && bg.complete){
      const scale = Math.max(state.w / bg.width, state.h / bg.height);
      const iw = bg.width * scale;
      const ih = bg.height * scale;
      const xParallax = -(state.cameraX / (state.worldW - state.w || 1)) * Math.max(0, iw - state.w);
      ctx.drawImage(bg, xParallax, 0, iw, ih);
    } else {
      const g = ctx.createLinearGradient(0,0,0,state.h);
      g.addColorStop(0,'#1633bb'); g.addColorStop(1,'#0b0f1c');
      ctx.fillStyle = g; ctx.fillRect(0,0,state.w,state.h);
    }

    const t = state.phaseTime * PHASES[state.phase].weatherSpeed;
    const dusk = (Math.sin(t) + 1) / 2;
    const storm = Math.max(0, Math.sin(t*1.8 - 1.2));
    ctx.fillStyle = `rgba(12,20,55,${0.15 + dusk*0.28 + storm*0.1})`;
    ctx.fillRect(0,0,state.w,state.h);

    ctx.fillStyle = `rgba(255,225,150,${0.06 + 0.18*(1-dusk)})`;
    ctx.beginPath(); ctx.arc(state.w*0.82, state.h*0.16, 50 + 15*Math.sin(t*2), 0, Math.PI*2); ctx.fill();

    if (state.phase >= 2){
      ctx.strokeStyle = `rgba(170,220,255,${0.14 + storm*0.18})`;
      ctx.lineWidth = 2;
      for (const r of state.rain){
        r.y += r.sp * (0.25 + storm) * 0.016;
        if (r.y > state.h + 20){ r.y = -20; r.x = Math.random()*state.w; }
        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x - 8, r.y + 20);
        ctx.stroke();
      }
    }
  }

  function drawCloud(p){
    const x = p.x - state.cameraX;
    const y = p.y;
    ctx.save();
    ctx.fillStyle = '#f8fbff';
    ctx.strokeStyle = '#d8e8ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x + 30, y + 26, 20, Math.PI*0.8, Math.PI*2);
    ctx.arc(x + 58, y + 18, 24, Math.PI, Math.PI*2);
    ctx.arc(x + 94, y + 18, 26, Math.PI, Math.PI*2);
    ctx.arc(x + 128, y + 24, 22, Math.PI*1.1, Math.PI*2);
    ctx.arc(x + 88, y + 34, 42, 0, Math.PI);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawHero(pl){
    const x = pl.x - state.cameraX;
    const y = pl.y;
    const blink = state.invuln > 0 && Math.floor(state.invuln*12)%2===0;
    if (blink) return;
    ctx.save();
    ctx.translate(x + pl.w/2, y + pl.h/2);
    ctx.scale(pl.facing,1);
    if (state.celebrate > 0){
      const a = Math.sin(state.celebrate*22)*0.14;
      ctx.rotate(a);
    }
    if (heroImg.complete){
      ctx.drawImage(heroImg, -44, -58, 88, 116);
    } else {
      ctx.fillStyle = '#0e49cd'; ctx.fillRect(-20,-40,40,70);
      ctx.fillStyle = '#f1ddc6'; ctx.fillRect(-15,-58,30,28);
    }
    if (state.celebrate > 0){
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(-26,-20); ctx.lineTo(-44,-52); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(26,-20); ctx.lineTo(44,-52); ctx.stroke();
    }
    ctx.restore();

    if (state.whiteMarker > 0){
      const alpha = Math.floor(state.whiteMarker*8)%2===0 ? 1 : 0.15;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(x + pl.w/2, y - 18, 20, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  function drawEnemy(e){
    const x = e.x - state.cameraX, y = e.y;
    ctx.save();
    ctx.translate(x,y);
    const coat = e.variant === 'A' ? '#5d2d2d' : '#30343c';
    const tie = e.variant === 'A' ? '#9b1c1c' : '#616b7a';
    ctx.fillStyle = '#f0d8bf';
    ctx.fillRect(14, 0, 18, 18);
    ctx.fillStyle = '#222';
    ctx.fillRect(12, 0, 22, 8);
    ctx.fillStyle = coat;
    ctx.fillRect(6, 18, 34, 42);
    ctx.fillStyle = '#fff';
    ctx.fillRect(17, 18, 12, 16);
    ctx.fillStyle = tie;
    ctx.fillRect(21, 20, 4, 18);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(10, 60, 12, 30);
    ctx.fillRect(24, 60, 12, 30);
    ctx.fillStyle = '#343434';
    ctx.fillRect(38, 26, 18, 8);
    ctx.restore();
  }

  function drawItems(){
    for (const item of state.items){
      if (item.collected) continue;
      const x = item.x - state.cameraX, y = item.y + Math.sin(item.bob)*6;
      ctx.save();
      ctx.font = '30px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.emoji, x + item.w/2, y + item.h/2);
      ctx.restore();
    }
  }

  function drawGround(){
    const horizon = state.groundY;
    ctx.fillStyle = 'rgba(7,10,22,.92)';
    ctx.fillRect(0, horizon, state.w, state.h - horizon);
    for (let i = 0; i < state.w; i += 60){
      ctx.fillStyle = i % 120 === 0 ? '#ffd84f' : '#1c233d';
      ctx.fillRect(i, horizon + 6, 26, 18);
    }
  }

  function drawBullets(){
    for (const b of state.bullets){
      const x = b.x - state.cameraX;
      ctx.fillStyle = '#ffcf33';
      ctx.beginPath(); ctx.arc(x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.8)';
      ctx.stroke();
    }
  }

  function render(){
    ctx.clearRect(0,0,state.w,state.h);
    drawBackground();
    drawGround();
    state.platforms.forEach(drawCloud);
    drawItems();
    state.enemies.forEach(drawEnemy);
    drawBullets();
    drawHero(state.player);
  }

  function loop(ts){
    const dt = Math.min(0.033, (ts - state.last) / 1000 || 0.016);
    state.last = ts;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
